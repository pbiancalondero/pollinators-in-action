<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../assets/img/bee-icon-2.ico" type="image/x-icon" />
    <title>Polinizadores em Ação</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/common/header.css">
    <link rel="stylesheet" href="../../assets/css/gallery/gallery.css">
    <link rel="stylesheet" href="../../assets/css/common/footer.css">
    <link rel="stylesheet" href="../../assets/css/common/style.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <script>
        fetch('../header/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                ajustarNavbar();
            });

        function ajustarNavbar() {
            let path = window.location.pathname;
            let isHome = path.includes("/home/home.html") || path.endsWith("/home/");

            let navLinks = document.querySelector(".navbar-nav");

            if (!isHome) {
                let homeLink = navLinks.querySelector("a[href='#home']");
                if (homeLink) homeLink.setAttribute("href", "/src/home/home.html");
            }
        }
    </script>
    <main>

        <section id="introducao" class="mt-5 intro-section">
            <div class="container">

                <div class="intro-title">
                    <h2 class="section-title">Galeria de fotos</h2>
                    <div class="under-title-line"></div>
                </div>

                <div class="intro-text">
                    <p>Acompanhe através de imagens o desenvolvimento do nosso projeto<br />de preservação de abelhas
                        nativas sem ferrão.</p>
                </div>

        </section>


        <section id="informacoes" class="py-3 info-gallery">
            <div class="container">
                <div class="row g-4 justify-content-center">

                    <div class="col-md-3">
                        <div class="gallery-card text-center">
                            <h4 class="gallery-title mb-2"><b>xxx</b><br />caixas de abelhas</h4>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="gallery-card text-center">
                            <h4 class="gallery-title mb-2"><b>yyy</b><br />tipos de flores</h4>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="gallery-card text-center">
                            <h4 class="gallery-title mb-2"><b>zzz</b><br />espécies de abelhas</h4>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="galeria" class="py-4 gallery-section">

            <div class="container">
                <div class="d-flex justify-content-center mb-4 gap-2">
                    <button class="btn btn-outline-success btn-data" data-dia="dia-25-09-16">Dia 16/09/2025 (Semana
                        1)</button>
                    <button class="btn btn-outline-success btn-data" data-dia="dia-25-09-23">Dia 23/09/2025 (Semana
                        2)</button>
                    <button class="btn btn-outline-success btn-data" data-dia="dia-25-09-30">Dia 30/09/2025 (Semana
                        3)</button>

                    <button class="btn btn-outline-success btn-data" data-dia="extras">Extras</button>
                </div>

                <div class="legenda" id="leganda"></div>
                <div class="gallery">
                    <div id="carouselArena" class="carousel slide">
                        <div class="carousel-inner" id="carousel-inner-container"></div>

                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselArena"
                            data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Anterior</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carouselArena"
                            data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Próximo</span>
                        </button>
                    </div>
                </div>

                <div class="mt-3 text-center">
                    <span id="legenda-dinamica" class="section-subtitle">Selecione um dia para ver as fotos.</span>
                </div>
            </div>
        </section>

        <div id="footer-placeholder"></div>

        <script>
            fetch('../footer/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });
        </script>

    </main>

    <script src="gallery-data.js"></script>
    <script src="../interactive-bubble.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>

</html>
